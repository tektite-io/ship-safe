name: Ship Safe Security Scan
description: Scan your codebase with 23 AI security agents. Posts findings as a PR comment and fails the check if the score drops below your threshold.

branding:
  icon: shield
  color: blue

inputs:
  path:
    description: Path to scan (default is repo root)
    required: false
    default: '.'
  threshold:
    description: Minimum passing score (0-100). Fail the check if score is below this.
    required: false
    default: '0'
  severity:
    description: Minimum severity to report (critical, high, medium, low)
    required: false
    default: 'low'
  sarif:
    description: Path to write SARIF output (for GitHub Security tab)
    required: false
    default: ''
  fail-on-secrets:
    description: Fail the check if any secrets are found
    required: false
    default: 'true'
  node-version:
    description: Node.js version to use
    required: false
    default: '20'

outputs:
  score:
    description: Security score (0-100)
  grade:
    description: Security grade (A+ through F)
  findings:
    description: Total number of findings
  secrets:
    description: Number of secret findings
  passed:
    description: Whether the scan passed the threshold

runs:
  using: composite
  steps:
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}

    - name: Run Ship Safe scan
      id: scan
      shell: bash
      run: |
        SARIF_FLAG=""
        if [ -n "${{ inputs.sarif }}" ]; then
          SARIF_FLAG="--sarif ${{ inputs.sarif }}"
        fi

        # Run the scan and capture JSON output
        set +e
        OUTPUT=$(npx --yes ship-safe@latest ci "${{ inputs.path }}" \
          --threshold "${{ inputs.threshold }}" \
          --severity "${{ inputs.severity }}" \
          --json \
          --no-ai \
          $SARIF_FLAG 2>/dev/null)
        EXIT_CODE=$?
        set -e

        # Parse outputs
        SCORE=$(echo "$OUTPUT" | node -e "let d='';process.stdin.on('data',c=>d+=c).on('end',()=>{try{const j=JSON.parse(d);console.log(j.score??0)}catch{console.log(0)}})" 2>/dev/null || echo "0")
        GRADE=$(echo "$OUTPUT" | node -e "let d='';process.stdin.on('data',c=>d+=c).on('end',()=>{try{const j=JSON.parse(d);console.log(j.grade??'F')}catch{console.log('F')}})" 2>/dev/null || echo "F")
        FINDINGS=$(echo "$OUTPUT" | node -e "let d='';process.stdin.on('data',c=>d+=c).on('end',()=>{try{const j=JSON.parse(d);console.log(j.totalFindings??0)}catch{console.log(0)}})" 2>/dev/null || echo "0")
        SECRETS=$(echo "$OUTPUT" | node -e "let d='';process.stdin.on('data',c=>d+=c).on('end',()=>{try{const j=JSON.parse(d);const c=j.categories;console.log(c?.secrets?.findingCount??0)}catch{console.log(0)}})" 2>/dev/null || echo "0")

        echo "score=$SCORE"     >> "$GITHUB_OUTPUT"
        echo "grade=$GRADE"     >> "$GITHUB_OUTPUT"
        echo "findings=$FINDINGS" >> "$GITHUB_OUTPUT"
        echo "secrets=$SECRETS" >> "$GITHUB_OUTPUT"

        PASSED="true"
        if [ $EXIT_CODE -ne 0 ]; then PASSED="false"; fi
        if [ "${{ inputs.fail-on-secrets }}" = "true" ] && [ "$SECRETS" -gt "0" ]; then PASSED="false"; fi
        echo "passed=$PASSED"   >> "$GITHUB_OUTPUT"

        # Print summary
        echo "## 🛡️ Ship Safe Security Scan" >> "$GITHUB_STEP_SUMMARY"
        echo "" >> "$GITHUB_STEP_SUMMARY"
        echo "| | |" >> "$GITHUB_STEP_SUMMARY"
        echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
        echo "| **Score** | $SCORE/100 ($GRADE) |" >> "$GITHUB_STEP_SUMMARY"
        echo "| **Findings** | $FINDINGS |" >> "$GITHUB_STEP_SUMMARY"
        echo "| **Secrets** | $SECRETS |" >> "$GITHUB_STEP_SUMMARY"
        echo "| **Passed** | $PASSED |" >> "$GITHUB_STEP_SUMMARY"

        if [ "$PASSED" = "false" ]; then
          echo "::error::Ship Safe scan failed — score: $SCORE/100, secrets: $SECRETS, findings: $FINDINGS"
          exit 1
        fi
